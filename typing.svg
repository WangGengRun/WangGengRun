<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 130" width="500" height="130">
  <style>
    .terminal-text {
      /* 强制使用等宽字体，确保每个字符宽度绝对一致 */
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0px;
      fill: #0047AB; /* 沉稳深蓝色 */
    }
    
    /* 核心：利用 clip-path 实现完美的逐字切入动画，不破坏字符本身的间距 */
    .line1 { clip-path: inset(0 100% 0 0); animation: type1 1.2s steps(15) forwards; }
    .line2 { clip-path: inset(0 100% 0 0); animation: type2 2.0s steps(35) 1.2s forwards; }
    .line3 { clip-path: inset(0 100% 0 0); animation: type3 1.5s steps(23) 3.2s forwards; }
    .line4 { clip-path: inset(0 100% 0 0); animation: type4 2.2s steps(36) 4.7s forwards; }

    /* 按各行字符长度精准裁剪：利用 X 轴百分比从 100% 裁剪到 0% */
    @keyframes type1 { to { clip-path: inset(0 0% 0 0); } }
    @keyframes type2 { to { clip-path: inset(0 0% 0 0); } }
    @keyframes type3 { to { clip-path: inset(0 0% 0 0); } }
    @keyframes type4 { to { clip-path: inset(0 0% 0 0); } }
  </style>

  <g class="terminal-text">
    <!-- 纯整行文本书写，完美保留等宽字体的原生高级间距 -->
    <text x="20" y="25" class="line1">&gt; I'm GodspRun.</text>
    <text x="20" y="55" class="line2">&gt; A Software Development Engineer.</text>
    <text x="20" y="85" class="line3">&gt; An Anime Enthusiast.</text>
    <text x="20" y="115" class="line4">&gt; Keep Learning, Keep Progressing.</text>
  </g>
</svg>
